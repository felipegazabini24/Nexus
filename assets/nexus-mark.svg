<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Nexus">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#23232f"/>
      <stop offset="1" stop-color="#121219"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbeec0"/>
      <stop offset="0.48" stop-color="#f0d277"/>
      <stop offset="1" stop-color="#e0bd4e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#e6c45a" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#e6c45a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect x="4" y="4" width="112" height="112" rx="28" fill="url(#tile)"/>
  <rect x="4" y="4" width="112" height="112" rx="28" fill="url(#glow)"/>
  <rect x="4.75" y="4.75" width="110.5" height="110.5" rx="27.25" fill="none" stroke="url(#gold)" stroke-opacity="0.55" stroke-width="1.5"/>

  <!-- N monogram -->
  <path d="M37 85 L37 37 L83 85 L83 37"
        fill="none" stroke="url(#gold)" stroke-width="10.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- punto dorado (firma "NEXUS.") -->
  <circle cx="83" cy="37" r="3" fill="#fbeec0"/>
</svg>
